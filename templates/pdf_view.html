<!DOCTYPE html>
<html>
<head>

<title>Mudra Story PDF</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
color:white;
text-align:center;
padding:40px;

background: linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#1a1a40);
background-size:400% 400%;
animation:bgmove 12s infinite ease;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
color:#00ffe1;
text-shadow:0 0 10px #00ffe1;
margin-bottom:30px;
}

/* PDF Container */

.pdf-box{
width:85%;
margin:auto;
padding:25px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);

border-radius:20px;

box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

iframe{
width:100%;
height:600px;
border-radius:15px;
border:2px solid #00ffe1;
}

/* Buttons */

.btn{
padding:12px 25px;
border:none;
border-radius:40px;
font-size:15px;
font-weight:600;
cursor:pointer;
margin:15px 10px;
transition:0.3s;
}

.btn-download{
background:linear-gradient(45deg,#4776E6,#8E54E9);
color:white;
}

.btn-back{
background:#444;
color:white;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 6px 20px rgba(0,0,0,0.5);
}

</style>

</head>

<body>

<h1>📄 Mudra Story Interpretation</h1>

<div class="pdf-box">

<iframe src="{{ url_for('static', filename='output_story.pdf') }}"></iframe>

</div>

<br>

<a href="/download_pdf">
<button class="btn btn-download">⬇ Download PDF</button>
</a>

<button class="btn btn-back" onclick="window.history.back()">← Back</button>

</body>
</html>
